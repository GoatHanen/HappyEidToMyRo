<!doctype html>
<html lang="en">
  <head>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css" />
    <title>HappyEidToMyRo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Aldrich&family=Pixelify+Sans:wght@400..700&display=swap"

    <title>Document</title>
    <style>
.goth-btn {
    /* الخصائص السابقة للجماليات */
    background: black;
    color: #666;
    border: 1px solid #333;
    padding: 10px 25px;
    letter-spacing: 5px;
    cursor: pointer;
    transition: 0.5s;

    
    position: fixed;      
    bottom: 30px;         
    left: 50%;           
    transform: translateX(-50%); 
    z-index: 999;         
  }
    </style>
    
  
  </head>
  <body>
    <div class="floating-container">
    <div class="bubble">❤️</div>
    <div class="bubble">🖤</div>
    <div class="bubble">❤️</div>
    <div class="bubble">🖤</div>
    <div class="bubble">❤️</div>
</div>
    
    
 

<audio id="myAudio">
    <source src="Saif Nabeel - Ashq Mot  سيف نبيل - عشك موت.mp3" type="audio/mpeg">
</audio>

<button class="goth-btn" onclick="playMusic()">سيف نبيل - عشق موووووووت</button>

<script>
    var audio = document.getElementById("myAudio");
    var slider = document.getElementById("seekSlider");

    function playMusic() {
        if (audio.paused) {
            audio.play().catch(function(error) {
                console.log("خطأ في التشغيل:", error);
            });
        } else {
            audio.pause();
        }
    }

    audio.ontimeupdate = function() {
        if (!isNaN(audio.duration)) {
            slider.max = audio.duration;
            slider.value = audio.currentTime;
        }
    };

    slider.oninput = function() {
        audio.currentTime = slider.value;
    };
</script>


    <div class="vignette"></div>
    <img src="spider (2).gif" class="float" alt="float">
    <!-- Envelope Screen -->
    <div id="envelope-container">
      <img src="book.png" alt="Envelope" id="envelope" />
      <p>♡ A Really Important Message ♡</p>
    </div>

    <!-- Letter Screen -->
    <div id="letter-container">
      <div class="letter-window">
        <h1 id="letter-title">كل عام وانتي بخير يا رو من <br>
          العايدين الفايزين السالمين الغانمين</h1>
          

        <img src="unhappy.gif" class="cat" id="letter-cat" />

        <div class="buttons" id="letter-buttons">
          <img src="answer.png" class="btn yes-btn" alt="Yes" />

          <div class="no-wrapper">
            <img src="thank you.png" class="btn no-btn" alt="No" />
        
          </div>
        </div>

        <p id="final-text" class="final-text" style="display: none">
          <strong>FunFact:</strong> انا مره صدق قلت لوحده من عماتي شكرًا
        </p>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
